quarkus.quinoa.package-manager-install.node-version=20.10.0
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.ui-root-path=quinoa
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.enable-spa-routing=true

# Synapse Vault Configuration
synapse.vault.path=${user.home}/.synapse/vault

# Force Quarkus server to bind only to localhost for privacy
quarkus.http.host=127.0.0.1
