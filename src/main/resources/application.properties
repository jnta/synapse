quarkus.quinoa.package-manager-install.node-version=22.13.1
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.ui-root-path=quinoa
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.ui-dir=src/main/webui
quarkus.quinoa.build-dir=dist

# Synapse Vault Configuration
synapse.vault.path=${user.home}/.synapse/vault

# Force Quarkus server to bind only to localhost for privacy
quarkus.http.host=127.0.0.1
quarkus.http.port=0

# Logging Configuration
quarkus.log.console.json=true
quarkus.log.file.enable=true
quarkus.log.file.path=logs/synapse.log
quarkus.log.file.json=true
quarkus.log.file.rotation.max-file-size=5M
quarkus.log.file.rotation.max-backup-index=2
